<!doctype html>
<html lang="en">
<head>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BrandName — Beautiful Interface</title>
  <script src="https://jquery.com"></script>
  <script src="https://cloudflare.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
:root{
  --bg:#0f1724;
  --card:#0f1724;
  --muted:#94a3b8;
  --accent:#ffd166;
  --accent-2:#06b6d4;
  --glass: rgba(255,255,255,0.04);
  --radius:14px;
  --max-width:1200px;
  --container-padding:24px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background:linear-gradient(180deg,#071024 0%, #081026 100%);
  color:#e6eef8;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.container{max-width:var(--max-width);margin:0 auto;padding:0 var(--container-padding)}

.site-header{position:fixed;left:0;right:0;top:0;z-index:60;background:linear-gradient(180deg, rgba(7,10,20,0.6), rgba(7,10,20,0.25));backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.03)}
.header-inner{display:flex;align-items:center;gap:20px;height:72px}
.logo{font-family:"Playfair Display",serif;font-weight:700;color:var(--accent);text-decoration:none;font-size:20px}
.nav{margin-left:8px;display:flex;gap:16px;align-items:center}
.nav a{color:var(--muted);text-decoration:none;font-weight:600}
.cta{margin-left:auto;background:linear-gradient(90deg,var(--accent),var(--accent-2));padding:10px 14px;border-radius:10px;color:#071024;text-decoration:none;font-weight:700}

.hero{position:relative;height:100vh;min-height:620px;display:flex;align-items:flex-end;padding-bottom:120px;overflow:hidden}
.hero-inner{position:relative;z-index:30;padding-top:100px}
.intro{max-width:640px}
.intro h1{font-family:"Playfair Display",serif;font-size:clamp(28px,6vw,56px);line-height:1.02;margin:0 0 12px;color:#fff}
.lead{color:var(--muted);margin:0 0 18px}
.hero-cta{display:flex;gap:12px}
.btn{display:inline-block;padding:10px 16px;border-radius:12px;text-decoration:none;font-weight:700}
/* Button base transition */
.btn{
  display:inline-block;
  padding:10px 16px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
  will-change: transform;
}

/* Hover lift effect */
.btn:hover{
  transform: translateY(-4px);
}

/* Primary button (Explore) hover glow */
.btn.primary:hover{
  box-shadow: 0 12px 30px rgba(255, 209, 102, 0.25);
  filter: brightness(1.05);
}

/* Ghost button (Learn more) hover effect */
.btn.ghost{
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease, color .25s ease;
}

.btn.ghost:hover{
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.25);
  color:#ffffff;
  box-shadow: 0 12px 30px rgba(6, 182, 212, 0.10);
}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#071024}
.btn.ghost{border:1px solid rgba(255,255,255,0.08);color:var(--muted);background:transparent}

.image-track{position:absolute;inset:0;display:flex;pointer-events:none}
.bg-image{flex:0 0 auto;width:100vw;height:100vh;object-fit:cover;filter:contrast(110%) saturate(110%);transform-origin:center center}

.section{padding:80px 0}
.features h2,.about h2{font-family:"Playfair Display",serif;font-size:28px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card {
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.06),
    rgba(255, 255, 255, 0.02)
  );

  border: 1px solid rgba(255, 255, 255, 0.10);

  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(10px);

  padding: 22px;
  border-radius: 12px;

  /* smooth lift on hover/focus */
  transition: transform .45s cubic-bezier(.2,.8,.2,1), box-shadow .45s cubic-bezier(.2,.8,.2,1);
  will-change: transform, box-shadow;
}
.card{
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.09),
    rgba(255, 255, 255, 0.03)
  );
}

/* Hover / keyboard focus lift */
.card:hover,
.card:focus-within {
  transform: translateY(-10px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
}

/* Disable hover lift on touch devices where hover isn't available */
@media (hover: none) {
  .card:hover,
  .card:focus-within {
    transform: none;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
  }
}

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce) {
  .card {
    transition: none;
    transform: none !important;
  }
}

.about{background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent)}
.footer{padding:30px 0;color:var(--muted)}
.footer-inner{display:flex;align-items:center;gap:12px}
.social a{color:var(--muted);text-decoration:none;margin-left:12px}

@media (max-width:800px){
  .header-inner{height:64px}
  .hero{padding-bottom:80px;min-height:640px}
  .bg-image{height:calc(100vh - 64px)}
  .container{padding:0 16px}
}

@media (prefers-reduced-motion:reduce){
  .bg-image{transition:none!important}
  *{animation-duration:0.001ms!important}
}
  </style>
  <script defer src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <script defer src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="#">BrandName</a>
      <nav class="nav" aria-label="Main navigation">
        <a href="#features">Features</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a class="cta" href="contact.html">Get in touch</a>
    </div>
  </header>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
  AOS.init({
  duration: 800, 
  once: false,
  easing: "ease-out-cubic"
});
</script>

  <main>
    <section class="hero" aria-label="Hero">
      <div class="hero-inner container">
        <div class="intro">
          <h1>WIP</h1>
          <p class="lead">WIP</p>
          <div class="hero-cta">
            <a class="btn primary" href="#features">Explore</a>
            <a class="btn ghost" href="#about">Learn more</a>
          </div>
        </div>
      </div>

      <div class="image-track" aria-hidden="true">
        <img class="bg-image" src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b?auto=format&fit=crop&w=1400&q=80" alt="Landscape 1" loading="lazy">
        <img class="bg-image" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1400&q=80" alt="Landscape 2" loading="lazy">
        <img class="bg-image" src="https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1400&q=80" alt="Landscape 3" loading="lazy">
        <img class="bg-image" src="images/anh-phan-zxUyEWhcQaE-unsplash.jpg" alt="Landscape 4" loading="lazy">
      </div>
    </section>

    <section id="features" class="section features container">
      <h2>Features</h2>
      <div class="grid">
        <article class="card" data-aos="flip-down" data-aos-delay="0">
          <h3>WIP</h3>
          <p>WIP.</p>
        </article>
        <article class="card" data-aos="flip-down" data-aos-delay="150">
          <h3>WIP</h3>
          <p>WIP</p>
        </article>
        <article class="card" data-aos="flip-down" data-aos-delay="300">
          <h3>WIP</h3>
          <p>WIP</p>
        </article>
      </div>
    </section>

    <section id="about" class="section about">
      <div class="container">
        <h2>About</h2>
        <p>WIP.</p>
      </div>
    </section>

    <footer id="contact" class="footer">
      <div class="container footer-inner">
        <p>© 2026 BrandName — WIP</p>
        <nav class="social" aria-label="Social links">
          <a href="#">Twitter</a>
          <a href="#">Dribbble</a>
          <a href="privacy-policy.html" style="color: #3498db !important; text-decoration: underline;">Privacy Policy</a>
        </nav>
      </div>
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
